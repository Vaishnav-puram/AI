spring.application.name=rag

server.port=8082

spring.ai.chat.client.enabled=false

#api-key for Open AI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4.1
spring.ai.openai.chat.options.temperature=0.2

#ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=phi3:mini
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.embedding.options.model=mxbai-embed-large

#logging
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

#mariaDB config
spring.datasource.url=jdbc:mariadb://localhost:3308/spring_ai
spring.datasource.username=root
spring.datasource.password=Vaishv@123

spring.ai.vectorstore.mariadb.initialize-schema: true
spring.ai.vectorstore.mariadb.distance-type: COSINE
spring.ai.vectorstore.mariadb.dimensions: 1024

